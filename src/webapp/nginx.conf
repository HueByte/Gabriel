# Gabriel SPA — nginx site config.
#
# Two responsibilities:
#   1. Serve the Vite-built static assets with SPA fallback (history-mode routes).
#   2. Reverse-proxy /api/ to the .NET API container, mirroring the Vite dev
#      proxy so the browser sees same-origin requests. SSE works out-of-the-box
#      because we disable response buffering on the proxy block.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Long-cache the hashed Vite asset bundles; the filenames are content-hashed
    # so they're safe to cache aggressively.
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA history fallback — anything that isn't a real file falls through to
    # index.html so React Router can take over.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse-proxy the API. `api` is the compose service name.
    location /api/ {
        proxy_pass         http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SSE streaming — the chat endpoint emits text/event-stream and needs
        # tokens forwarded immediately rather than buffered.
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;

        # Cookie pass-through for the JWT auth scheme (HttpOnly access + refresh
        # cookies set by /api/auth/login).
        proxy_pass_request_headers on;
    }
}
